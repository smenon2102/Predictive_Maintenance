name: Predictive Maintenance MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r prediction_project/deployment/requirements.txt

      - name: Register dataset to Hugging Face
        env:
          PREDICTIVE_GIT_TOKEN: ${{ secrets.PREDICTIVE_GIT_TOKEN }}
        run: python prediction_project/model_building/data_register.py

  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r prediction_project/deployment/requirements.txt

      - name: Run data preparation
        env:
          PREDICTIVE_GIT_TOKEN: ${{ secrets.PREDICTIVE_GIT_TOKEN }}
        run: python prediction_project/model_building/prep.py

  model-training:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r prediction_project/deployment/requirements.txt

      - name: Train and register model
        env:
          PREDICTIVE_GIT_TOKEN: ${{ secrets.PREDICTIVE_GIT_TOKEN }}
        run: python prediction_project/model_building/train.py

  deploy-space:
    needs: model-training
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r prediction_project/deployment/requirements.txt

      - name: Deploy app to Hugging Face Space
        env:
          PREDICTIVE_GIT_TOKEN: ${{ secrets.PREDICTIVE_GIT_TOKEN }}
        run: python prediction_project/hosting/hosting.py
